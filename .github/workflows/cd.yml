name: CD - Deploy a Azure

on:
  push:
    branches: [main]

env:
  ACR_NAME:       ${{ secrets.ACR_LOGIN_SERVER }}
  IMAGE_NAME:     hubescolar
  CONTAINER_APP:  ca-hubescolar-prod
  RESOURCE_GROUP: rg-hubescolar-prod

jobs:
  deploy:
    runs-on: ubuntu-latest
    needs: build     # espera que el CI pase primero

    steps:
      - uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"
          cache: maven

      - name: Build JAR
        run: mvn package -DskipTests

      - name: Login a Azure Container Registry
        uses: azure/docker-login@v1
        with:
          login-server: ${{ secrets.ACR_LOGIN_SERVER }}
          username:     ${{ secrets.ACR_USERNAME }}
          password:     ${{ secrets.ACR_PASSWORD }}

      - name: Build y Push imagen Docker
        run: |
          docker buildx build \
            --platform linux/amd64 \
            -t $ACR_NAME/$IMAGE_NAME:${{ github.sha }} \
            -t $ACR_NAME/$IMAGE_NAME:latest \
            --push \
            .

      - name: Login a Azure
        uses: azure/login@v1
        with:
          creds: |
            {
              "clientId": "${{ secrets.AZURE_CLIENT_ID }}",
              "clientSecret": "${{ secrets.AZURE_CLIENT_SECRET }}",
              "subscriptionId": "${{ secrets.AZURE_SUBSCRIPTION_ID }}",
              "tenantId": "${{ secrets.AZURE_TENANT_ID }}"
            }

      - name: Deploy a Container Apps
        run: |
          az containerapp update \
            --name $CONTAINER_APP \
            --resource-group $RESOURCE_GROUP \
            --image $ACR_NAME/$IMAGE_NAME:${{ github.sha }}